name: Build Reverse Driver

on:
  push:
    paths:
      - "reverse_driver/**"
      - ".github/workflows/build-reverse-driver.yml"
  pull_request:
    paths:
      - "reverse_driver/**"
      - ".github/workflows/build-reverse-driver.yml"
  workflow_dispatch:
    inputs:
      target_kernel:
        description: "Target kernel release for module vermagic"
        required: false
        default: "5.10.0-43-amd64"

env:
  TARGET_KERNEL: ${{ inputs.target_kernel || '5.10.0-43-amd64' }}

jobs:
  build-target-kernel:
    runs-on: ubuntu-22.04
    container:
      image: debian:bullseye

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y build-essential kmod

      - name: Install target kernel headers
        run: |
          set -eux
          if ! apt-get install -y "linux-headers-${TARGET_KERNEL}"; then
            echo "Failed to install linux-headers-${TARGET_KERNEL}" >&2
            echo "Available linux-headers packages (excerpt):" >&2
            apt-cache search '^linux-headers-[0-9].*amd64$' | head -n 100 >&2 || true
            exit 1
          fi

      - name: Resolve target KDIR
        id: kdir
        run: |
          set -eux
          KDIR="/lib/modules/${TARGET_KERNEL}/build"
          test -d "$KDIR"
          echo "KDIR=$KDIR" >> "$GITHUB_OUTPUT"
          echo "Using KDIR=$KDIR"

      - name: Build module
        run: |
          set -eux
          make -C reverse_driver KDIR="${{ steps.kdir.outputs.KDIR }}"

      - name: Verify vermagic
        run: |
          set -eux
          modinfo reverse_driver/nas_frontpanel_drv.ko | grep -E '^vermagic:'
          modinfo reverse_driver/nas_frontpanel_drv.ko | grep -F "${TARGET_KERNEL}"

      - name: Collect build outputs
        run: |
          set -eux
          mkdir -p out
          cp -v reverse_driver/*.ko out/
          if ls reverse_driver/*.mod reverse_driver/*.mod.c reverse_driver/Module.symvers reverse_driver/modules.order >/dev/null 2>&1; then
            cp -v reverse_driver/*.mod reverse_driver/*.mod.c reverse_driver/Module.symvers reverse_driver/modules.order out/ || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reverse-driver-build-${{ env.TARGET_KERNEL }}
          path: out/
          if-no-files-found: error
